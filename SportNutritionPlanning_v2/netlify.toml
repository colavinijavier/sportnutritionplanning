[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/NutriPlan.html"
  to = "/app.html"
  status = 302

[[redirects]]
  from = "/signup"
  to = "/login.html"
  status = 302

[[redirects]]
  from = "/signin"
  to = "/login.html"
  status = 302

[[redirects]]
  from = "/pricing"
  to = "/#pricing"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
